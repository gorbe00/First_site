<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>مسجد ما</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: sans-serif;
      direction: rtl;
      background: #f3f4f6;
      margin: 0;
      padding: 0;
    }

    header {
      background: #4f46e5;
      color: white;
      text-align: center;
      padding: 20px;
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
    }

    .card {
      background: white;
      margin: 15px;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      color: #4f46e5;
    }
  </style>
</head>

<body>

<header>
  <h1>مسجد ما</h1>
  <p>معرفی بخش‌های مختلف</p>
</header>

<div class="card">
  <h2>نوجوانان دختر</h2>
  <p>برگزاری جلسات فرهنگی و تربیتی</p>
</div>

<div class="card">
  <h2>نوجوانان پسر</h2>
  <p>فعالیت‌های ورزشی و فرهنگی</p>
</div>

<div class="card">
  <h2>بانوان</h2>
  <p>کلاس‌های آموزشی و مذهبی</p>
</div>

<div class="card">
  <h2>آقایان</h2>
  <p>برنامه‌های عمومی مسجد</p>
</div>

</body>
</html>
